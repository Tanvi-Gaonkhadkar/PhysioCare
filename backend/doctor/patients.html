<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patients</title>
<link rel="stylesheet" href="../CSS/style.css">
</head>

<body>

<div class="app">

<header class="header">
    👥 Patients
</header>

<div class="container">

    <!-- Filter (APP STYLE 🔥) -->
    <div class="card">
        <div class="filter-container">
            <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
            <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
            <button class="filter-btn" onclick="setFilter('new', this)">New</button>
            <button class="filter-btn" onclick="setFilter('recovered', this)">Recovered</button>
        </div>
    </div>

    <!-- Add Patient -->
    <div class="card">
        <h3>Add Patient</h3>
        <input type="text" placeholder="Name" class="input" id="name">
        <input type="number" placeholder="Age" class="input" id="age">
        <input type="text" placeholder="Phone" class="input" id="phone">

        <select class="input" id="status">
            <option value="active">Active</option>
            <option value="new">New</option>
            <option value="recovered">Recovered</option>
        </select>

        <button class="primary-btn" onclick="addPatient()">Add Patient</button>
    </div>

    <!-- Patient List -->
    <div class="card">
        <h3>Patient List</h3>
        <div id="patientList"></div>
    </div>

</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
    <button onclick="goHome()">Home</button>
    <button onclick="goToAppointments()">Appointments</button>
    <button style="color:#2aa7a0;">Patients</button>
</div>

</div>

<script src="../js/doctor.js"></script>

</body>
</html>
